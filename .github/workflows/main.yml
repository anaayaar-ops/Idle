name: Run WOLFdle Bot

# تشغيل تلقائي كل 4 ساعات — البوت الجديد بيقفل القديم فورًا (مش بينتظره)
# + إمكانية تشغيل يدوي من تبويب Actions للاختبار
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

# لما job جديدة تتشغل (بسبب الـ cron كل 4 ساعات)، أي job قديمة لسه شغالة
# هتتلغي (تتقفل) فورًا عشان تبدأ الجديدة بدل ما تستناها. ده بيحقق المطلوب:
# "كل 4 ساعات يعيد تشغيل نفسه ويغلق النسخة السابقة".
concurrency:
  group: wolfdle-bot
  cancel-in-progress: true

permissions:
  contents: write   # لازم عشان يقدر يعمل commit/push لملف learned_words.json

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 320   # هامش أمان فوق الـ 5 ساعات (300 دقيقة) اللي البوت هيشتغلها كحد أقصى

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start bot (يشتغل حتى 5 ساعات كحد أقصى ثم يوقف نفسه بهدوء)
        env:
          U_MAIL: ${{ secrets.U_MAIL }}
          U_PASS: ${{ secrets.U_PASS }}
          BOT_MAX_RUNTIME_MS: 18000000   # 5 ساعات بالظبط (حد أقصى أمان — عمليًا هيتقفل قبلها بسبب الـ cron الجديد كل 4 ساعات)
        run: node wolfdle_bot.js

      - name: حفظ الكلمات المتعلمة في الريبو
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learned_words.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: تحديث الكلمات المتعلمة [skip ci]"
            git push
          else
            echo "لا يوجد تغيير في الكلمات المتعلمة."
          fi
